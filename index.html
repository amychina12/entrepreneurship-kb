/* ===== Main App ===== */
function App() {
  const [papers, setPapers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('search');
  const [analyticsTab, setAnalyticsTab] = useState('overview'); /* overview | explorer | comparison */
  const [explorerTab, setExplorerTab] = useState('heatmap'); /* heatmap | methods | variables */
  const [query, setQuery] = useState('');
  const [filters, setFilters] = useState({journal:[],type:[],design:[],technique:[],tDisc:[],tName:[],tpL1:[],tpL2:[],continent:[],dsType:[],dsNamed:[]});
  const [yearMin, setYearMin] = useState('');
  const [yearMax, setYearMax] = useState('');
  const [sortBy, setSortBy] = useState('relevance');
  const [page, setPage] = useState(0);
  const [expanded, setExpanded] = useState(new Set());
  const [bookmarks, setBookmarks] = useState(loadBookmarks);
  const [showBookmarks, setShowBookmarks] = useState(false);
  const [toast, setToast] = useState('');
  const [exportOpen, setExportOpen] = useState(false);
  const [activeIdx, setActiveIdx] = useState(-1);
  const [showSettings, setShowSettings] = useState(false);
  const [aiSettings, setAISettings] = useState(loadAPISettings);
  const [showAI, setShowAI] = useState(false);
  const [aiSummary, setAISummary] = useState('');
  const [aiChatMsgs, setAIChatMsgs] = useState([]);
  const [aiError, setAIError] = useState('');
  const aiBaseMessages = useRef([]);
  const [isAdmin, setIsAdmin] = useState(IS_ADMIN_INIT);
  const [darkMode, setDarkMode] = useState(() => { try { return localStorage.getItem('kb_dark') === '1'; } catch(e) { return false; } });
  const [showHelp, setShowHelp] = useState(() => { try { return !localStorage.getItem('kb_help_seen'); } catch(e) { return true; } });
  const dismissHelp = () => { setShowHelp(false); try { localStorage.setItem('kb_help_seen', '1'); } catch(e) {} };
  useEffect(() => { document.body.classList.toggle('dark', darkMode); try { localStorage.setItem('kb_dark', darkMode ? '1' : '0'); } catch(e) {} }, [darkMode]);
  const perPage = 20;
  const searchRef = useRef();
  const exportRef = useRef();

  const cRefs = { year:useRef(), journal:useRef(), method:useRef(), theory:useRef(), topic:useRef(), country:useRef() };
  const cInst = useRef({});

  useEffect(() => {
    /* Load data: try embedded (production) first, then fetch external JSON (requires HTTP server) */
    if (window.__ERKB_DATA) { setPapers(window.__ERKB_DATA); setLoading(false); return; }
    fetch('data.json').then(r=>r.json()).then(d=>{setPapers(d);setLoading(false);}).catch(()=>{
      setLoading(false);
      if (window.location.protocol === 'file:') {
        alert('Cannot load data.json when opening as a local file.\\n\\nTo preview locally, run this in the 4_app folder:\\n  python3 -m http.server 8080\\n\\nThen open http://localhost:8080 in your browser.');
      }
    });
  }, []);

  /* BM25 corpus statistics — computed once when papers load */
  const corpusStats = useMemo(() => papers.length ? buildCorpusStats(papers) : null, [papers]);

  /* Autocomplete suggestion index — built once from papers */
  const acIndex = useMemo(() => {
    if (!papers.length) return [];
    const counts = {};
    const addTerm = (term, cat) => {
      if (!term || term === 'N/A' || term === 'Not Specified') return;
      const t = term.trim();
      if (!t || t.length < 2) return;
      const key = t.toLowerCase();
      if (!counts[key]) counts[key] = { label: t, cat, count: 0 };
      counts[key].count++;
    };
    papers.forEach(p => {
      if (p.tName) p.tName.split(';').forEach(t => addTerm(t.trim(), 'Theory'));
      if (p.tpL1) p.tpL1.split(';').forEach(t => addTerm(t.trim(), 'Topic'));
      if (p.tpL2) p.tpL2.split(';').forEach(t => addTerm(t.trim(), 'Sub-topic'));
      if (p.dv) p.dv.split(';').forEach(t => addTerm(t.trim(), 'Variable'));
      if (p.iv) p.iv.split(';').forEach(t => addTerm(t.trim(), 'Variable'));
      if (p.mod) p.mod.split(';').forEach(t => addTerm(t.trim(), 'Variable'));
      if (p.med) p.med.split(';').forEach(t => addTerm(t.trim(), 'Variable'));
      if (p.country) p.country.split(';').forEach(t => addTerm(t.trim(), 'Country'));
      if (p.type) addTerm(p.type, 'Method');
      if (p.design) p.design.split(';').forEach(t => addTerm(t.trim(), 'Method'));
    });
    return Object.values(counts).sort((a, b) => b.count - a.count);
  }, [papers]);

  /* Autocomplete state */
  const [acOpen, setAcOpen] = useState(false);
  const [acIdx, setAcIdx] = useState(-1);
  const acRef = useRef();

  /* Compute filtered suggestions based on current query */
  const acSuggestions = useMemo(() => {
    if (!acOpen || !query) return [];
    /* Get the last word/term being typed (after last space, AND, OR) */
    const parts = query.split(/\s+(?:AND|OR)\s+|\s+/i);
    const lastPart = (parts[parts.length - 1] || '').toLowerCase().replace(/^"/, '');
    if (lastPart.length < 2) return [];
    return acIndex
      .filter(item => item.label.toLowerCase().includes(lastPart))
      .slice(0, 8);
  }, [acOpen, query, acIndex]);

  /* Close autocomplete on outside click */
  useEffect(() => {
    const h = e => { if (acRef.current && !acRef.current.contains(e.target)) setAcOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  /* Close export menu on outside click */
  useEffect(() => { const h=e=>{if(exportRef.current&&!exportRef.current.contains(e.target))setExportOpen(false);}; document.addEventListener('mousedown',h); return()=>document.removeEventListener('mousedown',h); }, []);

  /* Show toast with auto-dismiss */
  const showToast = useCallback((msg) => { setToast(msg); setTimeout(()=>setToast(''),2000); }, []);

  /* Toggle bookmark */
  const toggleBookmark = useCallback((id) => {
    setBookmarks(prev => {
      const next = prev.includes(id) ? prev.filter(b=>b!==id) : [...prev, id];
      saveBookmarks(next);
      showToast(next.includes(id) ? 'Added to collection' : 'Removed from collection');
      return next;
    });
  }, [showToast]);

  /* Parse query for advanced search */
  const parsedQuery = useMemo(() => parseSearchQuery(query), [query]);
  const hlTerms = useMemo(() => extractTerms(parsedQuery), [parsedQuery]);

  const opts = useMemo(() => {
    if (!papers.length) return {};
    const c=(k,s)=>{const m=new Set();papers.forEach(p=>{const v=p[k];if(v){if(s)v.split(';').forEach(x=>{const t=x.trim();if(t&&t!=='N/A'&&t!=='Not Specified')m.add(t);});else if(v!=='N/A'&&v!=='Not Specified')m.add(v);}});return[...m].sort();};
    return {
      journal:c('journal'),
      type:c('type',1), design:c('design',1), technique:c('technique',1),
      tDisc:c('tDisc',1), tName:c('tName',1),
      tpL1:c('tpL1',1), tpL2:c('tpL2',1),
      continent:c('continent',1), dsType:c('dsType',1), dsNamed:c('dsNamed',1)
    };
  }, [papers]);

  const filtered = useMemo(() => {
    if (!papers.length) return [];
    let r = papers;
    if (showBookmarks) r = r.filter(p => bookmarks.includes(p.id));
    if (parsedQuery) {
      r = r.filter(p => {
        const text = [p.title,p.authors,p.abstract,p.rq,p.findings,p.tName,p.tags,p.gaps,p.iv,p.dv,p.notes,p.dsNamed,p.sample_raw,p.controls].filter(Boolean).join(' ');
        return matchesPaper(parsedQuery, text);
      });
    }
    const f = filters;
    if(f.journal.length) r=r.filter(p=>f.journal.includes(p.journal));
    if(f.type.length) r=r.filter(p=>p.type&&f.type.some(m=>p.type.includes(m)));
    if(f.design.length) r=r.filter(p=>p.design&&f.design.some(m=>p.design.includes(m)));
    if(f.technique.length) r=r.filter(p=>p.technique&&f.technique.some(m=>p.technique.includes(m)));
    if(f.tDisc.length) r=r.filter(p=>p.tDisc&&f.tDisc.some(t=>p.tDisc.includes(t)));
    if(f.tName.length) r=r.filter(p=>p.tName&&f.tName.some(t=>p.tName.includes(t)));
    if(f.tpL1.length) r=r.filter(p=>p.tpL1&&f.tpL1.some(t=>p.tpL1.includes(t)));
    if(f.tpL2.length) r=r.filter(p=>p.tpL2&&f.tpL2.some(t=>p.tpL2.includes(t)));
    if(f.continent.length) r=r.filter(p=>p.continent&&f.continent.some(c=>p.continent.includes(c)));
    if(f.dsType.length) r=r.filter(p=>p.dsType&&f.dsType.some(d=>p.dsType.includes(d)));
    if(f.dsNamed.length) r=r.filter(p=>p.dsNamed&&f.dsNamed.some(d=>p.dsNamed.includes(d)));
    if(yearMin) r=r.filter(p=>p.year>=parseInt(yearMin));
    if(yearMax) r=r.filter(p=>p.year<=parseInt(yearMax));
    /* BM25 relevance scoring — score all filtered papers when there's a query */
    if (parsedQuery && corpusStats) {
      const qTerms = extractTerms(parsedQuery);
      r = scoreAllPapers(r, qTerms, corpusStats);
    }
    if(sortBy==='relevance' && parsedQuery) r=[...r].sort((a,b)=>(b._bm25||0)-(a._bm25||0));
    else if(sortBy==='year_desc') r=[...r].sort((a,b)=>(b.year||0)-(a.year||0));
    else if(sortBy==='year_asc') r=[...r].sort((a,b)=>(a.year||0)-(b.year||0));
    else if(sortBy==='title') r=[...r].sort((a,b)=>(a.title||'').localeCompare(b.title||''));
    else if(sortBy==='author') r=[...r].sort((a,b)=>(a.authors||'').localeCompare(b.authors||''));
    else if(sortBy==='journal') r=[...r].sort((a,b)=>(a.journal||'').localeCompare(b.journal||'')||(b.year||0)-(a.year||0));
    return r;
  }, [papers, parsedQuery, filters, yearMin, yearMax, sortBy, showBookmarks, bookmarks, corpusStats]);

  useEffect(()=>{setPage(0);setExpanded(new Set());setActiveIdx(-1);setShowAI(false);},[query,filters,yearMin,yearMax,sortBy,showBookmarks]);

  const tp = Math.ceil(filtered.length/perPage);
  const pr = filtered.slice(page*perPage,(page+1)*perPage);
  const an = Object.values(filters).reduce((s,a)=>s+a.length,0)+(yearMin?1:0)+(yearMax?1:0);
  const clear=()=>{setFilters({journal:[],type:[],design:[],technique:[],tDisc:[],tName:[],tpL1:[],tpL2:[],continent:[],dsType:[],dsNamed:[]});setYearMin('');setYearMax('');setQuery('');};

  /* ===== Keyboard shortcuts ===== */
  useEffect(() => {
    const handler = (e) => {
      const tag = e.target.tagName;
      const isInput = tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
      if (e.key==='/' && !isInput) { e.preventDefault(); searchRef.current?.focus(); return; }
      /* Ctrl+Shift+E toggles admin mode with password */
      if (e.key==='E' && e.ctrlKey && e.shiftKey) {
        e.preventDefault();
        if (isAdmin) { try{localStorage.removeItem('erkb_admin');}catch{} setIsAdmin(false); showToast('Admin mode off'); return; }
        const pw = prompt('Enter admin password:');
        if (pw) { verifyAdminPw(pw).then(ok => { if(ok){try{localStorage.setItem('erkb_admin','1');}catch{} setIsAdmin(true); showToast('Admin mode activated');} else {showToast('Incorrect password');} }); }
        return;
      }
      if (e.key==='Escape') {
        if (showAI) { setShowAI(false); return; }
        if (showSettings) { setShowSettings(false); return; }
        if (expanded.size>0) { setExpanded(new Set()); return; }
        if (document.activeElement===searchRef.current) { searchRef.current.blur(); return; }
        if (showBookmarks) { setShowBookmarks(false); return; }
      }
      if (!isInput && view==='search') {
        if (e.key==='ArrowDown' || e.key==='j') { e.preventDefault(); setActiveIdx(prev => Math.min(prev+1, pr.length-1)); }
        if (e.key==='ArrowUp' || e.key==='k') { e.preventDefault(); setActiveIdx(prev => Math.max(prev-1, -1)); }
        if (e.key==='Enter' && activeIdx>=0 && activeIdx<pr.length) { e.preventDefault(); const gi=page*perPage+activeIdx; setExpanded(prev=>{const next=new Set(prev);if(next.has(gi))next.delete(gi);else next.add(gi);return next;}); }
        if (e.key==='s' && activeIdx>=0 && activeIdx<pr.length) { e.preventDefault(); toggleBookmark(pr[activeIdx].id); }
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [expanded, view, activeIdx, pr, page, perPage, showBookmarks, showSettings, showAI, toggleBookmark]);

  useEffect(() => { if (activeIdx>=0) { const cards=document.querySelectorAll('.card'); if(cards[activeIdx]) cards[activeIdx].scrollIntoView({block:'nearest',behavior:'smooth'}); } }, [activeIdx]);
  useEffect(() => { setActiveIdx(-1); }, [page]);

  /* ===== Charts ===== */
  useEffect(() => {
    if(view!=='analytics'||analyticsTab!=='overview'||!filtered.length) return;
    Object.values(cInst.current).forEach(c=>c?.destroy());
    cInst.current={};
    const dk = darkMode;
    const gridC = dk ? '#333' : '#f5f5f5';
    const tickC = dk ? '#aaa' : undefined;
    const legC = dk ? '#ccc' : undefined;
    const sf = '-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif';
    const chartOpts = { responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:legC,font:{family:sf,size:11}}}}, scales:{x:{grid:{color:gridC},ticks:{color:tickC,font:{family:sf,size:10}}},y:{grid:{color:gridC},ticks:{color:tickC,font:{family:sf,size:10}}}} };
    if(cRefs.year.current){
      const yj={};
      filtered.forEach(p=>{if(p.year){if(!yj[p.year])yj[p.year]={};yj[p.year][p.journal]=(yj[p.year][p.journal]||0)+1;}});
      const yrs=Object.keys(yj).sort();
      cInst.current.year=new Chart(cRefs.year.current,{type:'bar',data:{labels:yrs,datasets:['ETP','JBV','SEJ'].map(j=>({label:j,data:yrs.map(y=>yj[y]?.[j]||0),backgroundColor:JCOL[j],stack:'s'}))},options:{...chartOpts,plugins:{legend:{position:'top',labels:{color:legC,boxWidth:8,font:{family:sf,size:11}}}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:tickC,font:{family:sf,size:9}}},y:{stacked:true,beginAtZero:true,grid:{color:gridC},ticks:{color:tickC}}}}});
    }
    if(cRefs.journal.current){
      const jc={};filtered.forEach(p=>{jc[p.journal]=(jc[p.journal]||0)+1;});const ls=Object.keys(jc).sort((a,b)=>jc[b]-jc[a]);
      cInst.current.journal=new Chart(cRefs.journal.current,{type:'doughnut',data:{labels:ls.map(l=>JFULL[l]||l),datasets:[{data:ls.map(l=>jc[l]),backgroundColor:ls.map(l=>JCOL[l]||'#ccc')}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:legC,font:{family:sf,size:11}}}}}});
    }
    const bar=(ref,key,split,color,max)=>{
      if(!ref.current)return;const cnt={};
      filtered.forEach(p=>{const v=p[key];if(v){if(split)v.split(';').forEach(t=>{const k=t.trim();if(k&&k!=='N/A'&&k!=='Not Specified')cnt[k]=(cnt[k]||0)+1;});else cnt[v]=(cnt[v]||0)+1;}});
      const ls=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]).slice(0,max||10);
      cInst.current[key]=new Chart(ref.current,{type:'bar',data:{labels:ls.map(l=>l.length>38?l.slice(0,35)+'...':l),datasets:[{data:ls.map(l=>cnt[l]),backgroundColor:color}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:gridC},ticks:{color:tickC,font:{family:sf,size:10}}},y:{grid:{display:false},ticks:{color:tickC,font:{family:sf,size:10}}}}}});
    };
    bar(cRefs.method,'type',true,'#1A8917');
    bar(cRefs.theory,'tName',true,'#D4A13A',15);
    bar(cRefs.topic,'tpL1',true,'#6B5B95');
    bar(cRefs.country,'country',true,'#4A90E2',15);
    return()=>{Object.values(cInst.current).forEach(c=>c?.destroy());};
  }, [view, analyticsTab, filtered, darkMode]);

  const nTheories = useMemo(()=>{const s=new Set();filtered.forEach(p=>{if(p.tName)p.tName.split(';').forEach(t=>{const k=t.trim();if(k&&k!=='N/A')s.add(k);});});return s.size;},[filtered]);

  if(loading) return <div className="loading"><div className="spinner"></div><p>Loading papers...</p></div>;

  const sparkleIcon = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:14,height:14}}><path d="M12 2l2.09 6.26L20.18 10l-6.09 1.74L12 18l-2.09-6.26L3.82 10l6.09-1.74z"/></svg>;
  const gearIcon = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:16,height:16}}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>;

  return (
    <div>
      <div className="header">
        <h1>Entrepreneurship Research Knowledge Base</h1>
        <div className="header-right">
          <div className="journal-counts">
            <span><span className="jdot jdot-etp"></span>ETP {papers.filter(p=>p.journal==='ETP').length.toLocaleString()}</span>
            <span><span className="jdot jdot-jbv"></span>JBV {papers.filter(p=>p.journal==='JBV').length.toLocaleString()}</span>
            <span><span className="jdot jdot-sej"></span>SEJ {papers.filter(p=>p.journal==='SEJ').length.toLocaleString()}</span>
          </div>
          <button className="help-btn" title="User Guide" onClick={()=>setShowHelp(true)} style={{background:'none',border:'1px solid #E5E5E5',borderRadius:'50%',width:28,height:28,cursor:'pointer',fontSize:14,fontWeight:600,color:'#6B6B6B',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>?</button>
          <button className="dark-toggle" title={darkMode ? 'Switch to light mode' : 'Switch to dark mode'} onClick={()=>setDarkMode(!darkMode)}>{darkMode ? '\u2600\uFE0F' : '\uD83C\uDF19'}</button>
          <button className={`settings-btn${aiSettings?.apiKey?' has-key':''}`} title="AI Settings" onClick={()=>setShowSettings(true)}>{gearIcon}</button>
          <div className="vtoggle">
            <button className={`vbtn ${view==='search'&&!showBookmarks?'on':''}`} onClick={()=>{setView('search');setShowBookmarks(false);}}>Search</button>
            <button className={`vbtn ${showBookmarks?'on':''}`} onClick={()=>{setView('search');setShowBookmarks(!showBookmarks);}}>
              My Collection {bookmarks.length>0 && <span className="bcount">{bookmarks.length}</span>}
            </button>
            <button className={`vbtn ${view==='analytics'?'on':''}`} onClick={()=>{setView('analytics');setShowBookmarks(false);}}>Analytics</button>
            <button className={`vbtn ${view==='wiki'?'on':''}`} onClick={()=>{setView('wiki');setShowBookmarks(false);}}>Wiki</button>
            <button className={`vbtn ${view==='about'?'on':''}`} onClick={()=>{setView('about');setShowBookmarks(false);}}>About</button>
          </div>
        </div>
      </div>

      {view !== 'wiki' && view !== 'about' && <div className="search-bar">
        <div className="search-col ac-wrap" ref={acRef}>
          <input className="sinput" ref={searchRef} placeholder='Search papers, theories, authors, methods...' value={query}
            onChange={e => { setQuery(e.target.value); setAcOpen(true); setAcIdx(-1); }}
            onFocus={() => { if (query.length >= 2) setAcOpen(true); }}
            onKeyDown={e => {
              if (!acSuggestions.length) return;
              if (e.key === 'ArrowDown') { e.preventDefault(); setAcIdx(i => Math.min(i + 1, acSuggestions.length - 1)); }
              else if (e.key === 'ArrowUp') { e.preventDefault(); setAcIdx(i => Math.max(i - 1, -1)); }
              else if (e.key === 'Enter' && acIdx >= 0) {
                e.preventDefault();
                const sel = acSuggestions[acIdx];
                if (sel) {
                  /* Replace the last partial term with the selected suggestion */
                  const before = query.replace(/(?:^|.*\s)([\S]*)$/, (m, last) => m.slice(0, m.length - last.length));
                  setQuery(before + sel.label);
                  setAcOpen(false); setAcIdx(-1);
                }
              }
              else if (e.key === 'Escape') { setAcOpen(false); setAcIdx(-1); }
            }}
          />
          {acOpen && acSuggestions.length > 0 && (
            <div className="ac-drop">
              {acSuggestions.map((item, i) => {
                const parts = query.split(/\s+(?:AND|OR)\s+|\s+/i);
                const lastPart = (parts[parts.length - 1] || '').replace(/^"/, '');
                const idx = item.label.toLowerCase().indexOf(lastPart.toLowerCase());
                const labelEl = idx >= 0
                  ? <span className="ac-label">{item.label.slice(0, idx)}<mark>{item.label.slice(idx, idx + lastPart.length)}</mark>{item.label.slice(idx + lastPart.length)}</span>
                  : <span className="ac-label">{item.label}</span>;
                return (
                  <div key={item.label + item.cat} className={`ac-item${i === acIdx ? ' ac-active' : ''}`}
                    onMouseEnter={() => setAcIdx(i)}
                    onClick={() => {
                      const before = query.replace(/(?:^|.*\s)([\S]*)$/, (m, last) => m.slice(0, m.length - last.length));
                      setQuery(before + item.label);
                      setAcOpen(false); setAcIdx(-1);
                      searchRef.current && searchRef.current.focus();
                    }}>
                    {labelEl}
                    <span className="ac-cat">{item.cat} ({item.count})</span>
                  </div>
                );
              })}
            </div>
          )}
          <div className="search-tips">
            Supports: <code>"exact phrase"</code> &middot; <code>term1 AND term2</code> &middot; <code>term1 OR term2</code> &middot; multiple words are AND'd
          </div>
        </div>
        <div className="kbd-hint">Press <kbd>/</kbd> to search</div>
      </div>}

      {view !== 'wiki' && view !== 'about' && <div className="filters">
        <Filter label="Journal" options={opts.journal||[]} selected={filters.journal} onChange={v=>setFilters({...filters,journal:v})} />
        <span className="fsep"></span>
        <Filter label="Paper Type" options={opts.type||[]} selected={filters.type} onChange={v=>setFilters({...filters,type:v})} descs={TYPE_NOTES} />
        <Filter label="Design" options={opts.design||[]} selected={filters.design} onChange={v=>setFilters({...filters,design:v})} />
        <Filter label="Technique" options={opts.technique||[]} selected={filters.technique} onChange={v=>setFilters({...filters,technique:v})} />
        <span className="fsep"></span>
        <Filter label="Theory" options={opts.tDisc||[]} selected={filters.tDisc} onChange={v=>setFilters({...filters,tDisc:v})} />
        <Filter label="Theory (name)" options={opts.tName||[]} selected={filters.tName} onChange={v=>setFilters({...filters,tName:v})} />
        <span className="fsep"></span>
        <Filter label="Topic" options={opts.tpL1||[]} selected={filters.tpL1} onChange={v=>setFilters({...filters,tpL1:v})} />
        <Filter label="Sub-topic" options={opts.tpL2||[]} selected={filters.tpL2} onChange={v=>setFilters({...filters,tpL2:v})} />
        <span className="fsep"></span>
        <Filter label="Continent" options={opts.continent||[]} selected={filters.continent} onChange={v=>setFilters({...filters,continent:v})} />
        <Filter label="Data source" options={opts.dsType||[]} selected={filters.dsType} onChange={v=>setFilters({...filters,dsType:v})} />
        <Filter label="Dataset" options={opts.dsNamed||[]} selected={filters.dsNamed} onChange={v=>setFilters({...filters,dsNamed:v})} />
        <div className="yr"><input className="yi" placeholder="From" type="number" value={yearMin} onChange={e=>setYearMin(e.target.value)} /><span style={{color:'#ddd',fontSize:10}}>&ndash;</span><input className="yi" placeholder="To" type="number" value={yearMax} onChange={e=>setYearMax(e.target.value)} /></div>
        {an>0&&<button className="clr" onClick={clear}>Clear all</button>}
      </div>}

      {view==='about' ? <div className="about-section">
        <h2>About</h2>
        <p>
          The Entrepreneurship Research Knowledge Base is a comprehensive, searchable database of {papers.length.toLocaleString()} papers
          published in the three leading entrepreneurship journals: <em>Entrepreneurship Theory and Practice</em> (ETP),
          <em>Journal of Business Venturing</em> (JBV), and <em>Strategic Entrepreneurship Journal</em> (SEJ).
        </p>
        <p>
          Each paper has been processed through a multi-stage AI-assisted pipeline that extracts structured information
          (research questions, key findings, theories, methods, variables, geographic context) and standardizes it into
          filterable, searchable categories. The database spans {Math.min(...papers.filter(p=>p.year).map(p=>p.year))}&ndash;{Math.max(...papers.filter(p=>p.year).map(p=>p.year))}.
        </p>
        <p>
          This project was created by <strong>Wei Yu</strong>, Assistant Professor of Entrepreneurship at the
          National University of Singapore (NUS). For more about Wei's research and teaching,
          visit <a href="https://amychina12.github.io/weiyu/" target="_blank" rel="noopener noreferrer">amychina12.github.io/weiyu</a>.
        </p>
        <p style={{fontSize:'0.88em',color:'var(--muted)',marginTop:'1em'}}>
          <strong>Disclaimer:</strong> This database was built using an AI-assisted extraction and standardization pipeline.
          While every effort has been made to ensure accuracy, some papers may be missing, and extracted information
          (e.g., theory classifications, method coding, variable identification) may contain errors.
          Users are encouraged to verify critical details against the original publications.
        </p>
      </div> : view==='wiki' ? <WikiTab papers={papers} /> : view==='search' ? <>
        <div className="rbar">
          <div className="rinfo">
            <strong>{filtered.length.toLocaleString()}</strong> {showBookmarks ? 'saved papers' : 'papers'}{query&&<> matching &ldquo;{query}&rdquo;</>}
          </div>
          <div className="rbar-right">
            <button className="ai-btn" onClick={()=>{if(!aiSettings?.apiKey){setShowSettings(true);return;}setShowAI(!showAI);}} disabled={filtered.length===0} title={aiSettings?.apiKey ? 'Generate AI summary of filtered papers' : 'Set up API key first'}>
              {sparkleIcon} {showAI ? 'Hide AI' : 'Summarize with AI'}
            </button>
            <div className="export-menu" ref={exportRef}>
              <button className="export-btn" onClick={()=>setExportOpen(!exportOpen)}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export
              </button>
              {exportOpen && <div className="export-dd">
                <button className="export-opt" onClick={()=>{exportCSV(filtered);setExportOpen(false);showToast(`Exported ${filtered.length} papers as CSV`);}}>
                  Export as CSV<small>Title, authors, year, journal, RQ & findings</small>
                </button>
                <button className="export-opt" onClick={()=>{exportBibTeX(filtered);setExportOpen(false);showToast(`Exported ${filtered.length} papers as BibTeX`);}}>
                  Export as BibTeX<small>Citation info for reference managers</small>
                </button>
                {isAdmin && <button className="export-opt" onClick={()=>{const pw=prompt('Re-enter admin password to export full data:');if(pw){verifyAdminPw(pw).then(ok=>{if(ok){exportExcel(filtered);setExportOpen(false);showToast(`Exported ${filtered.length} papers as Excel`);}else{showToast('Incorrect password');}});}else{setExportOpen(false);}}}>
                  Export as Excel (Admin)<small>Full .xlsx with all fields (re-auth required)</small>
                </button>}
              </div>}
            </div>
            <select className="ssel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
              <option value="relevance">Relevance</option>
              <option value="year_desc">Newest first</option>
              <option value="year_asc">Oldest first</option>
              <option value="title">Title A&ndash;Z</option>
              <option value="author">Author A&ndash;Z</option>
              <option value="journal">Journal</option>
            </select>
          </div>
        </div>

        {showAI && <AISummaryPanel papers={filtered} query={query} onClose={()=>setShowAI(false)}
          summary={aiSummary} setSummary={setAISummary}
          chatMsgs={aiChatMsgs} setChatMsgs={setAIChatMsgs}
          aiError={aiError} setAIError={setAIError}
          baseMessagesRef={aiBaseMessages} />}

        <div className="papers">
          {pr.map((p,i)=>{const gi=page*perPage+i;return <Card key={p.id||`${page}-${i}`} p={p} q={query} hlTerms={hlTerms} open={expanded.has(gi)} toggle={()=>{setExpanded(prev=>{const next=new Set(prev);if(next.has(gi))next.delete(gi);else next.add(gi);return next;});setActiveIdx(i);}} bookmarked={bookmarks.includes(p.id)} onToggleBookmark={toggleBookmark} isActive={activeIdx===i} allPapers={papers} showRelevance={sortBy==='relevance'&&!!parsedQuery} maxScore={filtered.length>0?Math.max(...filtered.slice(0,1).map(p=>p._bm25||0)):0} />;})}
          {filtered.length===0&&<div className="empty">{showBookmarks?'No papers saved yet \u2014 click the star on any paper to add it to your collection':'No papers match your search'}</div>}
          {tp>1&&<div className="pgn">
            <button className="pb" disabled={page===0} onClick={()=>{setPage(page-1);setExpanded(new Set())}}>&lsaquo;</button>
            {Array.from({length:Math.min(tp,7)},(_,i)=>{let n;if(tp<=7)n=i;else if(page<3)n=i;else if(page>tp-4)n=tp-7+i;else n=page-3+i;return<button key={n} className={`pb ${page===n?'on':''}`} onClick={()=>{setPage(n);setExpanded(new Set())}}>{n+1}</button>})}
            <button className="pb" disabled={page>=tp-1} onClick={()=>{setPage(page+1);setExpanded(new Set())}}>&rsaquo;</button>
          </div>}
        </div>
      </> : <div className="analytics">
        <div className="analytics-tabs">
          <button className={`analytics-tab ${analyticsTab==='overview'?'on':''}`} onClick={()=>setAnalyticsTab('overview')}>Overview</button>
          <button className={`analytics-tab ${analyticsTab==='explorer'?'on':''}`} onClick={()=>setAnalyticsTab('explorer')}>Research Explorer</button>
          <button className={`analytics-tab ${analyticsTab==='comparison'?'on':''}`} onClick={()=>setAnalyticsTab('comparison')}>Journal Comparison</button>
        </div>

        {analyticsTab === 'overview' && <>
          <div className="srow">
            <div className="sc"><div className="sc-n">{filtered.length.toLocaleString()}</div><div className="sc-l">Papers</div></div>
            <div className="sc"><div className="sc-n">{nTheories}</div><div className="sc-l">Theories identified</div></div>
            <div className="sc"><div className="sc-n">{filtered.filter(p=>p.year).length>0?`${Math.min(...filtered.filter(p=>p.year).map(p=>p.year))}\u2013${Math.max(...filtered.filter(p=>p.year).map(p=>p.year))}`:'\u2013'}</div><div className="sc-l">Year range</div></div>
          </div>
          <div className="cg">
            <div className="cb w"><div className="cl">Publications over time</div><div className="ca t"><canvas ref={cRefs.year}></canvas></div></div>
            <div className="cb"><div className="cl">By journal</div><div className="ca"><canvas ref={cRefs.journal}></canvas></div></div>
            <div className="cb"><div className="cl">Paper types</div><div className="ca"><canvas ref={cRefs.method}></canvas></div></div>
            <div className="cb w"><div className="cl">Most-used theories</div><div className="ca t"><canvas ref={cRefs.theory}></canvas></div></div>
            <div className="cb"><div className="cl">Topic domains</div><div className="ca"><canvas ref={cRefs.topic}></canvas></div></div>
            <div className="cb"><div className="cl">Top countries</div><div className="ca"><canvas ref={cRefs.country}></canvas></div></div>
          </div>
        </>}

        {analyticsTab === 'explorer' && <div className="explorer-container">
          <div className="explorer-subtabs">
            <button className={`explorer-subtab ${explorerTab==='heatmap'?'on':''}`} onClick={()=>setExplorerTab('heatmap')}>Theory &times; Topic Heatmap</button>
            <button className={`explorer-subtab ${explorerTab==='methods'?'on':''}`} onClick={()=>setExplorerTab('methods')}>Method &times; Topic Heatmap</button>
            <button className={`explorer-subtab ${explorerTab==='variables'?'on':''}`} onClick={()=>setExplorerTab('variables')}>Variable Relationships</button>
          </div>
          {explorerTab === 'heatmap' && <TheoryTopicHeatmap papers={filtered} allPapers={papers} />}
          {explorerTab === 'methods' && <MethodTopicHeatmap papers={filtered} allPapers={papers} />}
          {explorerTab === 'variables' && <VariableRelationshipMap papers={filtered} allPapers={papers} />}
        </div>}

        {analyticsTab === 'comparison' && <JournalComparison papers={filtered} darkMode={darkMode} />}
      </div>}

      {showHelp && <HelpGuide onClose={dismissHelp} />}
      {showSettings && <SettingsModal settings={aiSettings} onClose={()=>setShowSettings(false)} onSave={s=>setAISettings(s)} />}
      <Toast message={toast} />

      <div className="shortcuts-help">
        <span><kbd>/</kbd> Search</span>
        <span><kbd>&#8593;</kbd><kbd>&#8595;</kbd> Navigate</span>
        <span><kbd>Enter</kbd> Expand</span>
        <span><kbd>S</kbd> Star</span>
        <span><kbd>Esc</kbd> Close</span>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
<script>
/* Basic deterrents — won't stop determined users but raises the bar */
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) { e.preventDefault(); }
  if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) { e.preventDefault(); }
  if (e.key === 'F12') { e.preventDefault(); }
});
</script>
</body>
</html>
