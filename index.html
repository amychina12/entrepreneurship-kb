<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .ai-chat { border-top: 1px solid #E5E5E5; flex-shrink: 0; }

  .ai-chat-msg { margin-bottom: 12px; }
  .ai-chat-msg.user { text-align: right; }
  .ai-chat-msg .msg-bubble { display: inline-block; max-width: 85%; padding: 12px 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; text-align: left; }
  .ai-chat-msg.user .msg-bubble { background: #E8F5E0; color: #292929; border-bottom-right-radius: 3px; }
  .ai-chat-msg.assistant .msg-bubble { background: #F7F7F7; color: #292929; border-bottom-left-radius: 3px; }
  .ai-chat-input-row { display: flex; gap: 8px; padding: 16px 28px; border-top: 1px solid #E5E5E5; background: #FAFAFA; border-radius: 0 0 12px 12px; }
  .ai-chat-input { flex: 1; padding: 12px 16px; border: 1px solid #E5E5E5; border-radius: 24px; font-size: 14px; outline: none; }
  .ai-chat-input:focus { border-color: #1A8917; }
  .ai-chat-send { padding: 10px 22px; border: none; background: #1A8917; color: white; border-radius: 24px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .ai-chat-send:hover { background: #168B0E; }
  .ai-chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Settings Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: flex; align-items: center; justify-content: center; }
  .modal { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.12); width: 480px; max-width: 90vw; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid #E5E5E5; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; color: #292929; }
  .modal-body { padding: 28px; }
  .modal-field { margin-bottom: 22px; }
  .modal-field:last-child { margin-bottom: 0; }
  .modal-field label { display: block; font-size: 13px; font-weight: 500; color: #292929; margin-bottom: 8px; }
  .modal-field input, .modal-field select { width: 100%; padding: 10px 14px; border: 1px solid #E5E5E5; border-radius: 8px; font-size: 14px; outline: none; }
  .modal-field input:focus, .modal-field select:focus { border-color: #1A8917; }
  .modal-field small { display: block; margin-top: 6px; font-size: 12px; color: #999; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid #E5E5E5; display: flex; justify-content: flex-end; gap: 10px; background: #FAFAFA; border-radius: 0 0 12px 12px; }
  .modal-save { padding: 10px 24px; border: none; background: #1A8917; color: white; border-radius: 24px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .modal-save:hover { background: #168B0E; }
  .modal-cancel { padding: 10px 24px; border: 1px solid #E5E5E5; background: white; color: #6B6B6B; border-radius: 24px; font-size: 14px; cursor: pointer; }

  /* Help guide modal */
  .help-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: flex; align-items: center; justify-content: center; overflow-y: auto; padding: 40px 20px; }
  .help-modal { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.12); width: 620px; max-width: 92vw; max-height: 85vh; display: flex; flex-direction: column; }
  .help-modal .modal-header { padding: 20px 28px; border-bottom: 1px solid #E5E5E5; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .help-modal .modal-header h2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; color: #292929; }
  .help-content { padding: 28px; overflow-y: auto; flex: 1; }
  .help-section { margin-bottom: 28px; }
  .help-section:last-child { margin-bottom: 0; }
  .help-section h3 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; color: #292929; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .help-section h3 .help-icon { font-size: 18px; }
  .help-section p, .help-section li { font-size: 14px; color: #555; line-height: 1.65; }
  .help-section ul { padding-left: 20px; margin-top: 6px; }
  .help-section li { margin-bottom: 5px; }
  .help-section code { background: #F5F5F5; padding: 2px 7px; border-radius: 4px; font-size: 13px; color: #292929; font-family: 'Menlo', 'Monaco', monospace; }
  .help-section kbd { background: #F5F5F5; border: 1px solid #E5E5E5; border-radius: 4px; padding: 2px 7px; font-size: 12px; color: #555; font-family: -apple-system, sans-serif; }
  .help-dismiss { padding: 10px 28px; border: none; background: #1A8917; color: white; border-radius: 24px; font-size: 14px; cursor: pointer; font-weight: 500; margin-top: 8px; align-self: center; }
  .help-dismiss:hover { background: #168B0E; }
  .help-footer { padding: 16px 28px; border-top: 1px solid #E5E5E5; display: flex; justify-content: center; flex-shrink: 0; background: #FAFAFA; border-radius: 0 0 12px 12px; }

  /* Wiki tab */
  .about-section { max-width: 720px; margin: 60px auto; padding: 0 24px; }
  .about-section h2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 600; margin-bottom: 24px; }
  .about-section p { margin-bottom: 16px; line-height: 1.8; color: #555; font-size: 16px; }
  .about-section a { color: #1A8917; text-decoration: none; font-weight: 500; }
  .about-section a:hover { text-decoration: underline; }

  .wiki { padding: 32px 60px 60px; max-width: 900px; margin: 0 auto; font-family: 'Source Serif 4', Georgia, serif; }
  .wiki h2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; color: #292929; margin-bottom: 8px; letter-spacing: -0.5px; }
  .wiki .wiki-subtitle { font-size: 15px; color: #6B6B6B; margin-bottom: 36px; line-height: 1.6; }
  .wiki h3 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 600; color: #292929; margin: 40px 0 14px; padding-bottom: 8px; border-bottom: 1px solid #E5E5E5; }
  .wiki h3:first-of-type { margin-top: 0; }
  .wiki h4 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; color: #292929; margin: 24px 0 10px; }
  .wiki p { font-size: 15px; color: #444; line-height: 1.75; margin-bottom: 14px; }
  .wiki ul, .wiki ol { padding-left: 24px; margin-bottom: 14px; }
  .wiki li { font-size: 15px; color: #444; line-height: 1.7; margin-bottom: 4px; }
  .wiki code { background: #F5F5F5; padding: 2px 7px; border-radius: 4px; font-size: 13px; color: #292929; font-family: 'Menlo', 'Monaco', monospace; }
  .wiki strong { color: #292929; }
  .wiki-toc { background: #FAFAFA; border: 1px solid #E5E5E5; border-radius: 10px; padding: 20px 28px; margin-bottom: 36px; }
  .wiki-toc h4 { margin: 0 0 10px; font-size: 14px; font-weight: 600; color: #6B6B6B; text-transform: uppercase; letter-spacing: 0.5px; }
  .wiki-toc ol { padding-left: 20px; margin: 0; }
  .wiki-toc li { font-size: 14px; margin-bottom: 4px; }
  .wiki-toc a { color: #1A8917; text-decoration: none; }
  .wiki-toc a:hover { text-decoration: underline; }
  .wiki-table { width: 100%; border-collapse: collapse; margin: 14px 0 20px; font-size: 14px; }
  .wiki-table th { text-align: left; padding: 10px 14px; background: #FAFAFA; border: 1px solid #E5E5E5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; color: #292929; font-size: 13px; }
  .wiki-table td { padding: 8px 14px; border: 1px solid #E5E5E5; color: #444; vertical-align: top; line-height: 1.5; }
  .wiki-table tr:hover td { background: #F8FDF7; }
  .wiki-stat { display: inline-block; background: #F0F8ED; color: #1A8917; font-weight: 600; padding: 2px 8px; border-radius: 10px; font-size: 13px; font-family: -apple-system, sans-serif; }
  .wiki-pipeline { background: #FAFAFA; border: 1px solid #E5E5E5; border-radius: 10px; padding: 20px 24px; margin: 14px 0 20px; }
  .wiki-step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .wiki-step:last-child { margin-bottom: 0; }
  .wiki-step-num { background: #1A8917; color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: -apple-system, sans-serif; flex-shrink: 0; margin-top: 1px; }
  .wiki-step-body { flex: 1; }
  .wiki-step-title { font-weight: 600; color: #292929; font-size: 14px; font-family: -apple-system, sans-serif; }
  .wiki-step-desc { font-size: 13px; color: #6B6B6B; margin-top: 2px; line-height: 1.5; }
  .wiki-flow { display: flex; align-items: center; gap: 12px; margin: 20px 0 28px; flex-wrap: wrap; }
  .wiki-flow-box { background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 12px 18px; text-align: center; font-family: -apple-system, sans-serif; }
  .wiki-flow-box .wf-label { font-size: 12px; color: #6B6B6B; margin-bottom: 4px; }
  .wiki-flow-box .wf-value { font-size: 15px; font-weight: 600; color: #292929; }
  .wiki-flow-arrow { font-size: 20px; color: #ccc; }

  /* BM25 relevance score badge */
  .relevance-badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .relevance-badge .rel-bar { width: 32px; height: 4px; border-radius: 2px; background: #E5E5E5; overflow: hidden; }
  .relevance-badge .rel-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* Analytics sub-tabs */
  .analytics-tabs { display: flex; gap: 0; margin: 0 60px 20px; background: transparent; border-radius: 0; padding: 0; width: auto; border-bottom: 1px solid #E5E5E5; }
  .analytics-tab { padding: 12px 20px; border: none; background: transparent; border-radius: 0; font-size: 14px; cursor: pointer; color: #6B6B6B; font-weight: 500; transition: all 0.15s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .analytics-tab.on { background: none; color: #292929; box-shadow: none; border-bottom-color: #1A8917; }
  .analytics-tab:hover:not(.on) { color: #292929; }

  /* Research Explorer */
  .explorer-container { margin: 0 60px; }
  .explorer-subtabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid #E5E5E5; }
  .explorer-subtab { padding: 10px 20px; border: none; background: none; font-size: 14px; cursor: pointer; color: #6B6B6B; font-weight: 500; transition: all 0.15s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .explorer-subtab.on { color: #292929; border-bottom-color: #1A8917; }
  .explorer-subtab:hover:not(.on) { color: #292929; }

  /* Heatmap */
  .heatmap-wrap { background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 28px; overflow-x: auto; }
  .heatmap-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; color: #292929; margin-bottom: 4px; }
  .heatmap-subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; color: #999; margin-bottom: 20px; }
  .heatmap-table { border-collapse: collapse; font-size: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .heatmap-table th { padding: 8px 12px; font-weight: 600; color: #6B6B6B; white-space: nowrap; text-align: center; border-bottom: 1px solid #E5E5E5; }
  .heatmap-table th.row-header { text-align: right; max-width: 220px; overflow: hidden; text-overflow: ellipsis; color: #292929; font-weight: 500; }
  .heatmap-table td { padding: 0; text-align: center; }
  .heatmap-cell { width: 56px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; cursor: pointer; transition: all 0.15s; border-radius: 4px; margin: 1px; }
  .heatmap-cell:hover { transform: scale(1.1); z-index: 2; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .heatmap-cell.zero { color: #ccc; background: #F7F7F7 !important; }
  .heatmap-legend { display: flex; align-items: center; gap: 10px; margin-top: 16px; font-size: 12px; color: #999; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .heatmap-legend-bar { width: 140px; height: 12px; border-radius: 6px; background: linear-gradient(to right, #E5E5E5, #1A8917); }

  /* Heatmap tooltip */
  .heatmap-tooltip { position: fixed; background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 12px 16px; font-size: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); z-index: 500; pointer-events: none; max-width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .heatmap-tooltip strong { display: block; font-size: 13px; color: #292929; margin-bottom: 4px; }
  .heatmap-tooltip .tt-count { font-weight: 600; color: #1A8917; }
  .heatmap-tooltip .tt-papers { margin-top: 8px; font-size: 11px; color: #6B6B6B; line-height: 1.5; }

  /* Variable Relationship Map */
  .varmap-container { background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 28px; }
  .varmap-search { display: flex; gap: 10px; margin-bottom: 16px; }
  .varmap-input { flex: 1; max-width: 520px; padding: 12px 20px; border: 1px solid #E5E5E5; border-radius: 24px; font-size: 14px; outline: none; background: #F7F7F7; }
  .varmap-input:focus { border-color: #1A8917; background: white; }
  .varmap-input::placeholder { color: #999; }
  .varmap-hint { font-size: 13px; color: #999; margin-bottom: 16px; }
  .varmap-stats { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; color: #6B6B6B; margin-bottom: 14px; padding: 10px 14px; background: #F7F7F7; border-radius: 8px; }
  .varmap-stats strong { color: #1A8917; }

  .pathway-list { display: flex; flex-direction: column; gap: 0; max-height: 600px; overflow-y: auto; }
  .pathway-card { background: white; border: none; border-bottom: 1px solid #E5E5E5; border-radius: 0; padding: 16px 0; transition: background-color 0.15s; }
  .pathway-card:hover { background-color: #FAFAFA; }
  .pathway-arrow { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: #292929; flex-wrap: wrap; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .pathway-iv { background: #E8F2FF; color: #4A6FA5; padding: 4px 12px; border-radius: 12px; font-size: 13px; }
  .pathway-dv { background: #FFF0EB; color: #B35A3A; padding: 4px 12px; border-radius: 12px; font-size: 13px; }
  .pathway-arrow-icon { color: #999; font-size: 16px; }
  .pathway-count { margin-left: auto; background: #1A8917; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .pathway-meta { margin-top: 8px; font-size: 13px; color: #6B6B6B; line-height: 1.6; }
  .pathway-meta span { color: #1A8917; font-weight: 500; }
  .pathway-papers { margin-top: 10px; padding-top: 10px; border-top: 1px solid #E5E5E5; font-size: 13px; color: #6B6B6B; line-height: 1.6; cursor: pointer; }
  .pathway-papers-toggle { color: #1A8917; font-weight: 500; cursor: pointer; font-size: 13px; margin-top: 6px; }
  .pathway-paper-item { padding: 6px 0; border-bottom: 1px solid #F5F5F5; }
  .pathway-paper-item:last-child { border-bottom: none; }

  /* Research Gap Radar */
  .gap-container { display: flex; flex-direction: column; gap: 24px; }
  .gap-heatmaps { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .gap-card { background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 28px; overflow-x: auto; }
  .gap-card-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; color: #292929; margin-bottom: 4px; }
  .gap-card-subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; color: #999; margin-bottom: 16px; }
  .gap-cell { width: 52px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; cursor: pointer; transition: all 0.15s; border-radius: 4px; margin: 1px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .gap-cell:hover { transform: scale(1.1); z-index: 2; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .gap-cell.zero { color: #ccc; background: #F7F7F7 !important; }
  .gap-cell.gap-flag { outline: 2px solid #E8855A; outline-offset: -1px; }
  .gap-list { background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 28px; }
  .gap-list-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; color: #292929; margin-bottom: 14px; }
  .gap-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .gap-item:last-child { border-bottom: none; }
  .gap-badge { background: #FFF0EB; color: #E8855A; font-weight: 600; font-size: 12px; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
  .gap-label { color: #292929; }
  .gap-legend { display: flex; align-items: center; gap: 12px; font-size: 11px; color: #999; margin-top: 10px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .gap-legend-swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }

  @media (max-width: 900px) {
    .gap-heatmaps { grid-template-columns: 1fr; }
  }

  /* Journal comparison */
  .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 0 60px; }
  .comparison-card { background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 24px; }
  .comparison-card .cl { font-size: 14px; font-weight: 600; color: #292929; margin-bottom: 14px; }
  .comparison-card .ca { height: 280px; }
  .comparison-card.wide { grid-column: 1 / -1; }
  .comparison-table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .comparison-table th { text-align: left; padding: 10px 14px; border-bottom: 1px solid #E5E5E5; color: #6B6B6B; font-weight: 600; font-size: 12px; }
  .comparison-table td { padding: 10px 14px; border-bottom: 1px solid #F5F5F5; color: #292929; }
  .comparison-table tr:last-child td { border-bottom: none; }
  .comparison-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 0 60px 24px; }
  .comparison-stat { background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 20px; text-align: center; }
  .comparison-stat .j-name { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #292929; }
  .comparison-stat .stat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; color: #6B6B6B; }
  .comparison-stat .stat-val { font-weight: 600; color: #292929; }

  /* AI export button */
  .ai-export-btn { padding: 8px 18px; border: 1px solid #E5E5E5; border-radius: 24px; font-size: 13px; cursor: pointer; background: white; color: #6B6B6B; transition: all 0.15s; font-weight: 500; }
  .ai-export-btn:hover { background: #F8FDF7; border-color: #1A8917; color: #1A8917; }

  @media (max-width: 768px) {
    .header, .search-bar, .filters, .rbar, .papers, .analytics { padding-left: 16px; padding-right: 16px; }
    .cg, .srow { grid-template-columns: 1fr; }
    .header { flex-wrap: wrap; gap: 8px; }
    .shortcuts-help { display: none; }
    .ai-panel { width: 96vw; max-height: 92vh; border-radius: 12px; }
    .analytics-tabs, .explorer-container, .comparison-grid, .comparison-summary { margin-left: 16px; margin-right: 16px; }
    .ctitle { font-size: 16px; }
    body { font-size: 15px; }
  }

  /* ===== DARK MODE ===== */
  /* Dark mode toggle button */
  .dark-toggle { border: none; background: none; cursor: pointer; font-size: 18px; padding: 4px 6px; transition: all 0.15s; border-radius: 6px; line-height: 1; }
  .dark-toggle:hover { background: #F5F5F5; }
  body.dark .dark-toggle:hover { background: #333; }

  body.dark { background: #1a1a1a; color: #E0E0E0; }
  body.dark ::selection { background: #2E7D32; color: white; }
  body.dark ::-webkit-scrollbar-track { background: #1a1a1a; }
  body.dark ::-webkit-scrollbar-thumb { background: #444; }
  body.dark ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* Header */
  body.dark .header { background: #1e1e1e; border-bottom-color: #333; }
  body.dark .header h1 { color: #E0E0E0; }
  body.dark .journal-counts { color: #999; }

/* ===== Advanced search parser ===== */
function parseSearchQuery(raw) {
  const q = raw.trim();
  if (!q) return null;
  if (/\bOR\b/i.test(q)) {
    const parts = q.split(/\s+OR\s+/i).map(s => s.trim()).filter(Boolean);
    return { type: 'OR', terms: parts.map(p => parseSearchTerm(p)) };

    return { type: 'AND', terms: andParts.map(p => parseSearchTerm(p.trim())).filter(Boolean) };

  if (exactMatch) return { type: 'EXACT', term: exactMatch[1].toLowerCase() };

/* Lightweight stemmer: reduces words to a common root for fuzzy matching.
   Handles plurals (adversities→adversity), -ing, -tion, -ness, -ment, -ly, etc.
   Returns the stem — used so that "adversity" and "adversities" match the same docs. */
function simpleStem(word) {
  if (!word || word.length < 4) return word;
  let w = word.toLowerCase();
  /* Irregular plurals */
  const irregulars = {
    'children':'child','women':'woman','men':'man','people':'person',
    'studies':'study','companies':'company','strategies':'strategy',
    'opportunities':'opportunity','activities':'activity','communities':'community',
    'capabilities':'capability','economies':'economy','industries':'industry',
    'countries':'country','families':'family','policies':'policy',
    'theories':'theory','categories':'category','identities':'identity',
    'adversities':'adversity','inequities':'inequity','complexities':'complexity',
    'universities':'university','anxieties':'anxiety','capacities':'capacity',
    'personalities':'personality','vulnerabilities':'vulnerability',
    'probabilities':'probability','nationalities':'nationality',
    'municipalities':'municipality','disparities':'disparity',
    'ambiguities':'ambiguity','novelties':'novelty',
  };
  if (irregulars[w]) return irregulars[w];
  /* -ies → -y (e.g., adversities → adversity) — general rule */
  if (w.endsWith('ies') && w.length > 5) return w.slice(0, -3) + 'y';
  /* -ses, -xes, -zes, -ches, -shes → remove -es */
  if (w.endsWith('ses') || w.endsWith('xes') || w.endsWith('zes') ||
      w.endsWith('ches') || w.endsWith('shes'))
    return w.slice(0, -2);
  /* -ves → -f/-fe (e.g., lives→life, halves→half) */
  if (w.endsWith('ves') && w.length > 5) return w.slice(0, -3) + 'f';
  /* -s (but not -ss, -us, -is) */
  if (w.endsWith('s') && !w.endsWith('ss') && !w.endsWith('us') &&
      !w.endsWith('is') && w.length > 3)
    return w.slice(0, -1);
  return w;
}

  { key: 'abstract', weight: 1.0 },
  { key: 'tName',    weight: 0.8 },
  { key: 'tags',     weight: 0.8 },
  { key: 'iv',       weight: 0.7 },
  { key: 'dv',       weight: 0.7 },
  { key: 'rq',       weight: 0.6 },
  { key: 'gaps',     weight: 0.5 },
  { key: 'notes',    weight: 0.4 },
];
const BM25_K1 = 1.5, BM25_B = 0.75;

function bm25Tokenize(text) {
  if (!text) return [];
  return text.toLowerCase().replace(/[^\w\s-]/g, ' ').split(/\s+/).filter(t => t.length > 1);
}

/* Create a version of tokens with hyphens removed for fuzzy matching */
function bm25TokenizeNorm(text) {
  if (!text) return [];
  return text.toLowerCase().replace(/[^\w\s]/g, ' ').split(/\s+/).filter(t => t.length > 1);
}

function buildCorpusStats(papers) {
  /* Pre-compute per-field average doc length and document frequencies */
  const fieldStats = {};
  BM25_FIELDS.forEach(({ key }) => {
    let totalLen = 0;
    const df = {}; /* term → document frequency */
    papers.forEach(p => {
      const tokens = bm25Tokenize(p[key]);
      totalLen += tokens.length;
      const seen = new Set(tokens);
      seen.forEach(t => { df[t] = (df[t] || 0) + 1; });
    });
    fieldStats[key] = { avgdl: totalLen / (papers.length || 1), df, N: papers.length };
  });
  return fieldStats;
}

function bm25Score(queryTerms, paper, corpusStats) {
  if (!queryTerms.length) return 0;
  /* Expand query terms with synonyms and hyphen variants */
  const expandedTerms = expandQueryTerms(queryTerms);
  let totalScore = 0;
  BM25_FIELDS.forEach(({ key, weight }) => {
    const tokens = bm25Tokenize(paper[key]);
    /* Also create dehyphenated token list for fuzzy matching */
    const tokensNorm = bm25TokenizeNorm(paper[key]);
    const dl = tokens.length;
    const stats = corpusStats[key];
    if (!stats || dl === 0) return;
    const { avgdl, df, N } = stats;
    /* Count term frequencies in this document (both original and dehyphenated) */
    const tf = {};
    tokens.forEach(t => { tf[t] = (tf[t] || 0) + 1; });
    const tfNorm2 = {};
    tokensNorm.forEach(t => { tfNorm2[t] = (tfNorm2[t] || 0) + 1; });
    /* Track which original query terms have matched to avoid double-counting */
    const matchedOriginals = new Set();
    expandedTerms.forEach(qt => {
      const qtLower = qt.toLowerCase().replace(/[^\w\s-]/g, '');
      const qtDehy = qtLower.replace(/-/g, '');
      /* Check exact token match, then dehyphenated match, then substring match */
      let freq = tf[qtLower] || 0;
      if (freq === 0) freq = tfNorm2[qtDehy] || 0;
      /* Also check if any token contains the query term as substring */
      if (freq === 0) {
        tokens.forEach(t => { if (t.includes(qtLower) || t.replace(/-/g,'').includes(qtDehy)) freq += 0.5; });
      }
      if (freq === 0) return;
      /* Use IDF of the most common variant to avoid inflating rare-term scores */
      const n = Math.max(df[qtLower] || 0, df[qtDehy] || 0, 1);
      const idf = Math.log((N - n + 0.5) / (n + 0.5) + 1);
      const tfScore = (freq * (BM25_K1 + 1)) / (freq + BM25_K1 * (1 - BM25_B + BM25_B * (dl / avgdl)));
      totalScore += weight * idf * tfScore;
    });
  });
  /* Normalize: if expanded terms are much larger than original, scale back to avoid inflation */
  const expansionFactor = expandedTerms.length / (queryTerms.length || 1);
  return totalScore / Math.max(1, Math.sqrt(expansionFactor));
}

function scoreAllPapers(papers, queryTerms, corpusStats) {
  return papers.map(p => ({ ...p, _bm25: bm25Score(queryTerms, p, corpusStats) }));
}

/* Bionic reading: bold the first portion of each word to create fixation points */
function bionicize(node) {
  if (!node) return null;
  if (typeof node === 'string') {
    return node.split(/(\s+)/).map((segment, i) => {
      if (/^\s+$/.test(segment)) return segment;
      const boldLen = segment.length <= 3 ? Math.ceil(segment.length * 0.6) : Math.ceil(segment.length * 0.45);
      return <span key={i}><b>{segment.slice(0, boldLen)}</b>{segment.slice(boldLen)}</span>;
    });
  }
  if (typeof node === 'number') return node;
  if (Array.isArray(node)) return node.map((child, i) => <React.Fragment key={i}>{bionicize(child)}</React.Fragment>);
  if (node && node.props && node.props.children != null) {
    return React.cloneElement(node, {}, bionicize(node.props.children));
  }
  return node;
}

function DItem({ label, children, bionic, dyslexic }) {
  if (!children) return null;
  const content = bionic ? bionicize(children) : children;
  const cls = `d-text${bionic ? ' bionic' : ''}${dyslexic ? ' dyslexic' : ''}`;
  return <div className="d-item">{label && <div className="d-label">{label}</div>}<div className={cls}>{content}</div></div>;
}

/* ===== Related Papers helpers ===== */
function splitSemi(v) {
  if (!v) return [];
  return v.split(';').map(s => s.trim()).filter(s => s && s !== 'N/A' && s !== 'Not Specified');
}

function findRelated(paper, allPapers, mode, max) {
  const results = [];
  const pid = paper.id;
  if (mode === 'tags') {
    const myTags = splitSemi(paper.tags);
    if (!myTags.length) return [];
    const myTagsLower = myTags.map(t => t.toLowerCase());
    for (const p of allPapers) {
      if (p.id === pid) continue;
      const pTags = splitSemi(p.tags);
      if (!pTags.length) continue;
      const pTagsLower = pTags.map(t => t.toLowerCase());
      const shared = myTags.filter(t => pTagsLower.includes(t.toLowerCase()));
      if (shared.length >= 2) results.push({ paper: p, matches: shared, score: shared.length });
    }
  } else if (mode === 'theory') {
    const myTheories = splitSemi(paper.tName);
    if (!myTheories.length) return [];
    for (const p of allPapers) {
      if (p.id === pid) continue;
      const pTheories = splitSemi(p.tName);
      const shared = myTheories.filter(t => pTheories.includes(t));
      if (shared.length > 0) results.push({ paper: p, matches: shared, score: shared.length });
    }
  } else if (mode === 'topic') {
    const myTopics = splitSemi(paper.tpL2 || paper.tpL1);
    if (!myTopics.length) return [];
    for (const p of allPapers) {
      if (p.id === pid) continue;
      const pTopics = splitSemi(p.tpL2 || p.tpL1);
      const shared = myTopics.filter(t => pTopics.includes(t));
      if (shared.length > 0) results.push({ paper: p, matches: shared, score: shared.length });
    }
  } else if (mode === 'method') {
    const myMethods = splitSemi(paper.design);
    if (!myMethods.length) return [];
    for (const p of allPapers) {
      if (p.id === pid) continue;
      const pMethods = splitSemi(p.design);
      const shared = myMethods.filter(t => pMethods.includes(t));
      if (shared.length > 0) results.push({ paper: p, matches: shared, score: shared.length });
    }
  }
  results.sort((a, b) => b.score - a.score || (b.paper.year || 0) - (a.paper.year || 0));
  return results.slice(0, max || 5);
}

function buildSummaryPrompt(papers, searchQuery) {
  const journalCounts = {};
  const yearRange = [9999, 0];
  const methods = {};
  const theories = {};
  const topics = {};
  papers.forEach(p => {
    journalCounts[p.journal] = (journalCounts[p.journal]||0) + 1;
    if (p.year) { yearRange[0] = Math.min(yearRange[0], p.year); yearRange[1] = Math.max(yearRange[1], p.year); }
    splitSemi(p.type).forEach(m => { methods[m] = (methods[m]||0)+1; });
    splitSemi(p.tName).forEach(t => { theories[t] = (theories[t]||0)+1; });
    splitSemi(p.tpL2 || p.tpL1).forEach(t => { topics[t] = (topics[t]||0)+1; });
  });

  /* Two-stage strategy for large sets: if >150 papers AND BM25 scores available,
     send top 80 with full detail + remaining as brief context.
     For ≤150 papers, send all with full detail. */
  const hasBM25 = papers.length > 0 && papers[0]._bm25 !== undefined;
  const useTwoStage = papers.length > 150 && hasBM25;
  const TOP_N = 80;

  let sorted = papers;
  if (useTwoStage) {
    sorted = [...papers].sort((a, b) => (b._bm25 || 0) - (a._bm25 || 0));
  }
  const detailPapers = useTwoStage ? sorted.slice(0, TOP_N) : sorted;
  const contextPapers = useTwoStage ? sorted.slice(TOP_N) : [];

  const paperSummaries = detailPapers.map((p, i) => {
    let entry = `[${i+1}] ${p.authors} (${p.year}). "${p.title}" ${p.journal}.`;
    if (p.abstract) entry += `\n  Abstract: ${p.abstract}`;
    if (p.findings) entry += `\n  Findings: ${p.findings}`;
    if (p.tName) entry += `\n  Theories: ${p.tName}`;
    if (p.type) entry += `\n  Type: ${p.type}`;
    if (p.design) entry += `\n  Design: ${p.design}`;
    if (p.technique) entry += `\n  Technique: ${p.technique}`;
    if (p.iv) entry += `\n  IV: ${p.iv}`;
    if (p.dv) entry += `\n  DV: ${p.dv}`;
    if (p.med) entry += `\n  Mediators: ${p.med}`;
    if (p.mod) entry += `\n  Moderators: ${p.mod}`;
    if (p.gaps) entry += `\n  Research Gaps: ${p.gaps}`;
    if (p.future) entry += `\n  Future Directions: ${p.future}`;
    if (p.rq) entry += `\n  Research Question: ${p.rq}`;
    if (p.sample_raw) entry += `\n  Sample: ${p.sample_raw}`;
    return entry;
  }).join('\n\n');

  const contextList = contextPapers.length > 0
    ? '\n\nADDITIONAL CONTEXT PAPERS (title + year + journal only):\n' +
      contextPapers.map((p, i) => `[C${i+1}] ${p.authors} (${p.year}). "${p.title}" ${p.journal}.`).join('\n')
    : '';

  const topTheories = Object.entries(theories).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([t,c])=>`${t} (${c})`).join(', ');
  const topTopics = Object.entries(topics).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([t,c])=>`${t} (${c})`).join(', ');
  const topMethods = Object.entries(methods).sort((a,b)=>b[1]-a[1]).map(([m,c])=>`${m} (${c})`).join(', ');

  return {
    system: `You are a senior entrepreneurship researcher writing a targeted literature review. You are known for producing precise, evidence-based syntheses that report SPECIFIC DIRECTIONAL FINDINGS — not vague generalities.

CRITICAL RULES:
1. RELEVANCE FIRST: Before synthesizing, you MUST identify which papers are actually relevant to the search query. Exclude papers that only tangentially mention the topic or are not substantively about it. Clearly state how many papers you retained and which (by number) you excluded and why.
2. DIRECTIONAL FINDINGS: Never write vague statements like "X can affect Y" or "X is linked to Y." Instead, always report the DIRECTION and MECHANISM: "X increases/decreases Y through mechanism Z" or "X positively predicts Y, but this effect is attenuated/strengthened when..."
3. SPECIFIC EVIDENCE: For every claim, cite the specific paper(s) and include concrete details: effect directions, key moderating conditions, sample characteristics, boundary conditions.
4. NO FILLER: Do not pad with generic academic phrasing. Every sentence should convey substantive, actionable information a researcher would need.
5. CONTRADICTIONS MATTER: When papers disagree, explicitly note the contradiction and what might explain it (different samples, methods, contexts).`,
    user: `Synthesize the following ${papers.length} papers${searchQuery ? ` from a search for "${searchQuery}"` : ''} from the Entrepreneurship Research Knowledge Base (3 top journals: ETP, JBV, SEJ).

DATASET OVERVIEW:
- Total papers returned by search: ${papers.length}
- Journals: ${Object.entries(journalCounts).map(([j,c])=>`${j}: ${c}`).join(', ')}
- Year range: ${yearRange[0]}–${yearRange[1]}
- Methods: ${topMethods}
- Top theories: ${topTheories || 'Various'}
- Top topics: ${topTopics || 'Various'}

${useTwoStage
  ? `PAPER DATA (top ${TOP_N} most relevant papers with full detail, ranked by BM25 relevance score, plus ${contextPapers.length} context papers with titles only):`
  : `PAPER DATA (all ${papers.length} papers, full detail):`}
${paperSummaries}${contextList}

REQUIRED OUTPUT FORMAT:

### Step 1: Relevance Filtering
${searchQuery ? `The search query was "${searchQuery}". List which papers (by number) are DIRECTLY relevant to this topic and which are NOT (with a one-line reason for exclusion). Only synthesize the relevant papers in subsequent sections.` : 'All papers included (no specific search query).'}

### Overview
Number of relevant papers retained, journals, year range. One paragraph framing what this body of research collectively addresses.

### Key Findings by Theme
This is the MOST IMPORTANT section. Organize findings into clear thematic clusters. For each theme:
- State the theme name as a sub-heading
- Report SPECIFIC directional findings: "Author (Year) found that X **increases/decreases** Y (direction: positive/negative, magnitude if available). This effect is **mediated by** M and **moderated by** Z."
- When multiple papers address the same relationship, synthesize: "Across N studies, the evidence consistently shows that X → Y is positive (Author1, Year1; Author2, Year2), though Author3 (Year3) found this reverses when [condition]."
- Note any contradictory findings explicitly
- Every finding must specify: the direction of the effect, the mechanism if known, and any boundary conditions

### Theoretical Frameworks
Which specific theories are used, how they explain the phenomena, and where theoretical gaps exist. Don't just name theories — explain what they predict and whether the evidence supports those predictions.

### Methodological Assessment
Methods used, sample characteristics, strengths and limitations. Flag any methodological concerns (e.g., cross-sectional designs limiting causal claims, small samples, self-report bias).

### Research Gaps & Future Directions
Specific, actionable research gaps. Not generic calls for "more research" but specific questions left unanswered, specific methodological improvements needed, and specific theoretical extensions proposed by the authors.

### Variable Map
Present as a structured list:
- **Independent Variables**: List each with which papers use it
- **Dependent Variables**: Same
- **Mediators**: Same, with the pathway they mediate (X → M → Y)
- **Moderators**: Same, with what relationship they moderate and in which direction

Use Markdown. Be thorough and specific. A reader should understand the actual state of knowledge on this topic from your summary alone.`
  };
}

async function callAI(messages, settings) {
  if (!settings || !settings.apiKey) throw new Error('No API key configured. Click the settings gear to add your key.');

  if (settings.provider === 'anthropic') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: settings.model || 'claude-sonnet-4-20250514',
        max_tokens: 16384,
        system: messages[0]?.role === 'system' ? messages[0].content : undefined,
        messages: messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content }))
      })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `Anthropic API error: ${res.status}`); }
    const data = await res.json();
    return data.content[0].text;
  } else {
    /* OpenAI chat/completions */
    const model = settings.model || 'gpt-4o';
    /* Newer OpenAI models (gpt-4.1, gpt-5, o1, o3, etc.) use max_completion_tokens; older ones use max_tokens */
    const isNewModel = /^(gpt-[4-9]\.\d|gpt-[5-9]|o[1-9]|o\d-)/.test(model);
    const tokenParam = isNewModel ? { max_completion_tokens: 16384 } : { max_tokens: 4096 };
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.apiKey}` },
      body: JSON.stringify({
        model: model,
        messages: messages,
        ...tokenParam
      })
    });
    const providerName = 'OpenAI';
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `${providerName} API error: ${res.status}`); }
    const data = await res.json();
    console.log(`[ERKB AI] Raw ${providerName} response keys:`, Object.keys(data), 'choices:', data.choices?.length, 'finish_reason:', data.choices?.[0]?.finish_reason);
    /* Handle various response formats including newer models */
    const msg = data.choices?.[0]?.message;
    const text = msg?.content || msg?.refusal || data.choices?.[0]?.text || data.output_text || data.output || '';
    if (!text) {
      console.error('[ERKB AI] Full response:', JSON.stringify(data).slice(0, 2000));
      throw new Error(`Empty response from ${providerName} API. Check browser console (F12) for details. finish_reason: ` + (data.choices?.[0]?.finish_reason || 'unknown'));
    }
    if (msg?.refusal && !msg?.content) throw new Error('Model refused the request: ' + msg.refusal);
    return text;
  }
}

/* Simple markdown to React renderer */
function renderMarkdown(text) {
  if (!text) return null;
  const lines = text.split('\n');
  const elements = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('#### ')) {
      elements.push(<h4 key={i} dangerouslySetInnerHTML={{__html: inlineMarkdown(line.slice(5))}} />);
    } else if (line.startsWith('### ')) {
      elements.push(<h3 key={i}>{line.slice(4)}</h3>);
    } else if (line.startsWith('## ')) {
      elements.push(<h3 key={i}>{line.slice(3)}</h3>);
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      const items = [];
      while (i < lines.length && (lines[i].startsWith('- ') || lines[i].startsWith('* '))) {
        items.push(<li key={i} dangerouslySetInnerHTML={{__html: inlineMarkdown(lines[i].slice(2))}} />);
        i++;
      }
      elements.push(<ul key={'ul'+i}>{items}</ul>);
      continue;
    } else if (/^\d+\.\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
        items.push(<li key={i} dangerouslySetInnerHTML={{__html: inlineMarkdown(lines[i].replace(/^\d+\.\s/,''))}} />);
        i++;
      }
      elements.push(<ol key={'ol'+i}>{items}</ol>);
      continue;
    } else if (line.trim()) {
      elements.push(<p key={i} dangerouslySetInnerHTML={{__html: inlineMarkdown(line)}} />);
    }
    i++;
  }
  return elements;
}
function inlineMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(\d+)\]/g, '<strong style="color:#1A8917">[$1]</strong>');
}

/* ===== Wiki / Documentation Tab ===== */
function WikiTab({ papers }) {
  const n = papers.length;
  const pct = (field, exclude) => {
    const filled = papers.filter(p => {
      const v = p[field];
      if (!v) return false;
      const s = String(v).trim().toLowerCase();
      return s && s !== 'n/a' && s !== 'na' && s !== 'none' && (!exclude || !exclude.includes(s));
    }).length;
    return Math.round(100 * filled / n);
  };
  const countVal = (field, val) => papers.filter(p => {
    const v = p[field];
    if (!v) return false;
    return String(v).split(';').map(x => x.trim()).includes(val);
  }).length;
  const countUniq = (field) => {
    const s = new Set();
    papers.forEach(p => { if (p[field]) String(p[field]).split(';').forEach(x => { const v = x.trim(); if (v && v !== 'N/A') s.add(v); }); });
    return s.size;
  };

  return (
    <div className="wiki">
      <h2>Knowledge Base Documentation</h2>
      <p className="wiki-subtitle">
        This page documents how the Entrepreneurship Research Knowledge Base was constructed, from raw PDF papers to the interactive web app.
        It covers the three-phase pipeline (extraction, standardization, and filtering), the meaning of every filter, and the data fields available for export.
      </p>

      <div className="wiki-toc">
        <h4>Contents</h4>
        <ol>
          <li><a href="#wiki-overview">Overview</a></li>
          <li><a href="#wiki-extraction">Phase 1: PDF Extraction</a></li>
          <li><a href="#wiki-standardization">Phase 2: Standardization</a></li>
          <li><a href="#wiki-filtering">Phase 3: Filtering &amp; Export</a></li>
          <li><a href="#wiki-filters">Filter Reference</a></li>
          <li><a href="#wiki-json">JSON Data Fields</a></li>
        </ol>
      </div>

      <h3 id="wiki-overview">1. Overview</h3>

      <div className="wiki-flow">
        <div className="wiki-flow-box"><div className="wf-label">Input</div><div className="wf-value">~3,800 PDFs</div></div>
        <div className="wiki-flow-arrow">&rarr;</div>
        <div className="wiki-flow-box"><div className="wf-label">Phase 1</div><div className="wf-value">AI Extraction</div></div>
        <div className="wiki-flow-arrow">&rarr;</div>
        <div className="wiki-flow-box"><div className="wf-label">Phase 2</div><div className="wf-value">Standardization (22 functions)</div></div>
        <div className="wiki-flow-arrow">&rarr;</div>
        <div className="wiki-flow-box"><div className="wf-label">Phase 3</div><div className="wf-value">Filter &amp; Dedup</div></div>
        <div className="wiki-flow-arrow">&rarr;</div>
        <div className="wiki-flow-box"><div className="wf-label">Final</div><div className="wf-value">{n.toLocaleString()} papers &rarr; 32 JSON fields</div></div>
      </div>

      <p>
        The knowledge base covers <strong>{n.toLocaleString()}</strong> papers from three top entrepreneurship journals:
        <strong>ETP</strong> (Entrepreneurship Theory and Practice),
        <strong>JBV</strong> (Journal of Business Venturing), and
        <strong>SEJ</strong> (Strategic Entrepreneurship Journal),
        spanning {Math.min(...papers.filter(p=>p.year).map(p=>p.year))}&ndash;{Math.max(...papers.filter(p=>p.year).map(p=>p.year))}.
      </p>
      <p>
        Papers are processed in three phases, both AI-assisted. <strong>Phase 1</strong> uses a large language model (Claude) to read each PDF
        and extract 23 structured fields. <strong>Phase 2</strong> applies a reproducible Python codebook (<code>standardization_codebook.py</code>)
        with 22 functions that clean, normalize, and classify the raw extractions into standardized taxonomies, using a two-layer architecture:
        rule-based regex matching (85&ndash;98% coverage) followed by AI-powered classification for ambiguous cases.
        <strong>Phase 3</strong> filters out duplicates, OCR failures, non-research content, and retracted papers, then exports 32 fields to JSON for this app.
      </p>

      <h3 id="wiki-extraction">2. Phase 1: PDF Extraction (23 raw columns)</h3>
      <p>
        Each PDF paper is processed by the <code>paper-knowledge-base</code> skill, which uses Claude to perform a deep read of the full paper text
        and extract structured information. The extraction operates in a single comprehension pass per paper (not regex), producing one row in an Excel file.

        metadata and classifies it. Results are recorded as manual override dictionaries in the codebook, making future runs

      <div className="wiki-pipeline">
        <div className="wiki-step"><div className="wiki-step-num">1</div><div className="wiki-step-body"><div className="wiki-step-title">Raw Data Fixes</div><div className="wiki-step-desc">Patches extraction failures (garbled text, missing fields) directly in the raw data before any classification.</div></div></div>

  const hasRun = useRef(false);
  const timerRef = useRef(null);

  /* Timer for loading state */
  useEffect(() => {

    else { if (timerRef.current) clearInterval(timerRef.current); }
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, [loading]);

  const generateSummary = useCallback(async () => {
    const settings = loadAPISettings();
    if (!settings?.apiKey) { setError('No API key configured. Click the settings gear icon to add your key.'); return; }
    setLoading(true);
    setError('');
    setSummary('');
    setChatMsgs([]);
    try {
      const prompt = buildSummaryPrompt(papers, query);
      const msgs = [
        { role: 'system', content: prompt.system },
        { role: 'user', content: prompt.user }
      ];
      console.log('[ERKB AI] Sending request to', settings.provider, settings.model, '| Papers:', papers.length);
      const result = await callAI(msgs, settings);
      console.log('[ERKB AI] Got response, length:', result?.length);
      if (!result || !result.trim()) {
        setError('The AI returned an empty response. Try regenerating or using a different model.');
      } else {
        setSummary(result);
        baseMessages.current = [...msgs, { role: 'assistant', content: result }];
      }
    } catch (err) {
      console.error('[ERKB AI] Error:', err);
      setError(err.message || 'Unknown error occurred');
    }
    setLoading(false);
  }, [papers, query]);

  useEffect(() => { if (!hasRun.current && !summary) { hasRun.current = true; generateSummary(); } }, []);

  useEffect(() => { chatEndRef.current?.scrollIntoView({behavior:'smooth'}); }, [chatMsgs]);

  const sendChat = useCallback(async () => {
    if (!chatInput.trim() || chatLoading) return;
    const settings = loadAPISettings();
    const userMsg = chatInput.trim();
    setChatInput('');
    setChatMsgs(prev => [...prev, { role: 'user', content: userMsg }]);
    setChatLoading(true);
    try {
      const msgs = [...baseMessages.current, ...chatMsgs.map(m=>({role:m.role,content:m.content})), { role: 'user', content: userMsg }];
      const result = await callAI(msgs, settings);
      setChatMsgs(prev => [...prev, { role: 'assistant', content: result }]);
      baseMessages.current = [...baseMessages.current, ...chatMsgs.map(m=>({role:m.role,content:m.content})), { role: 'user', content: userMsg }, { role: 'assistant', content: result }];
    } catch (err) {
      setChatMsgs(prev => [...prev, { role: 'assistant', content: `Error: ${err.message}` }]);
    }
    setChatLoading(false);
  }, [chatInput, chatLoading, chatMsgs]);

  const exportSummary = useCallback(() => {
    let md = `# AI Literature Summary${query ? `: "${query}"` : ''}\n\n`;
    md += `*Generated from ${papers.length} papers in the Entrepreneurship Research Knowledge Base*\n\n---\n\n`;
    md += summary + '\n';
    if (chatMsgs.length > 0) {
      md += '\n---\n\n## Follow-up Discussion\n\n';
      chatMsgs.forEach(m => {
        md += m.role === 'user' ? `**Q:** ${m.content}\n\n` : `**A:** ${m.content}\n\n`;
      });
    }
    md += '\n---\n\n## Papers Analyzed\n\n';
    papers.forEach((p, i) => {
      md += `${i+1}. ${p.authors} (${p.year}). "${p.title}" *${JFULL[p.journal]||p.journal}*.\n`;
    });
    const blob = new Blob([md], {type:'text/markdown;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ai_summary_${query ? query.replace(/\s+/g,'_').slice(0,30) : 'all'}_${papers.length}papers.md`;
    a.click();
    URL.revokeObjectURL(a.href);
  }, [summary, chatMsgs, papers, query]);

  const sparkle = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2l2.09 6.26L20.18 10l-6.09 1.74L12 18l-2.09-6.26L3.82 10l6.09-1.74z"/></svg>;

  return (
    <div className="ai-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="ai-panel">
        <div className="ai-panel-header">
          <div className="ai-panel-title">{sparkle} AI Literature Summary <span className="ai-paper-count-badge">{papers.length} papers</span>{query && <span style={{marginLeft:8,fontWeight:400,color:'#1A8917'}}>on &ldquo;{query}&rdquo;</span>}</div>
          <div className="ai-panel-actions">
            {summary && <button className="ai-export-btn" onClick={exportSummary}>Export .md</button>}
            {summary && <button className="ai-export-btn" onClick={generateSummary}>Regenerate</button>}
            <button className="ai-close" onClick={onClose}>&times;</button>
          </div>
        </div>

        <div className="ai-panel-body">
          {loading && <div className="ai-loading"><div className="spinner"></div><p>Synthesizing {papers.length} papers{query && <> on &ldquo;{query}&rdquo;</>}... ({elapsed}s)</p>{elapsed > 10 && <p style={{color:'#bbb',fontSize:11,marginTop:6}}>Large requests can take 30–90 seconds</p>}{papers.length > 150 && papers[0]?._bm25 !== undefined
              ? <p style={{color:'#c8b8e0',fontSize:11,marginTop:4}}>Top 80 papers (by BM25 relevance) with full detail + {papers.length - 80} as context</p>
              : papers.length > 50 && <p style={{color:'#c8b8e0',fontSize:11,marginTop:4}}>Sending all {papers.length} papers with full detail</p>}</div>}
          {error && <div style={{padding:24,color:'#e55',fontSize:13}}>{error}</div>}
          {summary && <div className="ai-summary-content">{renderMarkdown(summary)}</div>}

        {summary && <div className="ai-chat">

            {chatMsgs.map((m, i) => (
              <div key={i} className={`ai-chat-msg ${m.role}`}>
                <div className="msg-bubble" dangerouslySetInnerHTML={{__html: inlineMarkdown(m.content.replace(/\n/g, '<br/>'))}} />
              </div>
            ))}
            {chatLoading && <div className="ai-chat-msg assistant"><div className="msg-bubble"><em>Thinking...</em></div></div>}
            <div ref={chatEndRef} />

          <div className="ai-chat-input-row">

            <button className="ai-chat-send" onClick={sendChat} disabled={chatLoading || !chatInput.trim()}>Send</button>

/* ===== Related Papers Section ===== */
function RelatedPapers({ paper, allPapers }) {
  const hasTags = paper.tags && splitSemi(paper.tags).length >= 2;
  const hasTheory = paper.tName && splitSemi(paper.tName).length > 0;
  const hasTopic = (paper.tpL2 || paper.tpL1) && splitSemi(paper.tpL2 || paper.tpL1).length > 0;
  const hasMethod = paper.design && splitSemi(paper.design).length > 0;
  const defaultTab = hasTags ? 'tags' : hasTheory ? 'theory' : hasTopic ? 'topic' : hasMethod ? 'method' : null;
  const [tab, setTab] = useState(defaultTab);
  useEffect(() => {
    const validTab = (tab === 'tags' && hasTags) || (tab === 'theory' && hasTheory) || (tab === 'topic' && hasTopic) || (tab === 'method' && hasMethod);
    if (!validTab) setTab(hasTags ? 'tags' : hasTheory ? 'theory' : hasTopic ? 'topic' : hasMethod ? 'method' : null);
  }, [paper]);
  const related = useMemo(() => tab ? findRelated(paper, allPapers, tab, 5) : [], [paper, allPapers, tab]);
  if (!hasTags && !hasTheory && !hasTopic && !hasMethod) return null;

  return (
    <div className="d-group g-related">
      <div className="d-group-title">Related Papers</div>
      <div className="rel-tabs">
        {hasTags && <button className={`rel-tab ${tab==='tags'?'on':''}`} onClick={()=>setTab('tags')}>By Keywords</button>}
        {hasTheory && <button className={`rel-tab ${tab==='theory'?'on':''}`} onClick={()=>setTab('theory')}>By Theory</button>}
        {hasTopic && <button className={`rel-tab ${tab==='topic'?'on':''}`} onClick={()=>setTab('topic')}>By Topic</button>}
        {hasMethod && <button className={`rel-tab ${tab==='method'?'on':''}`} onClick={()=>setTab('method')}>By Method</button>}
      </div>
      {related.length > 0 ? related.map((r, i) => (
        <div key={r.paper.id || i} className="rel-paper">
          <div className="rel-title">{r.paper.title}</div>
          <div className="rel-meta">{r.paper.authors} &middot; {r.paper.year} &middot; {r.paper.journal}</div>

/* ===== Research Explorer: Helper Functions ===== */

/* Theory × Topic Heatmap data builder */
function buildTheoryTopicMatrix(papers) {
  const theoryCounts = {};
  const topicList = [];
  const topicSet = new Set();
  const matrix = {};    /* theory → topic → count */
  const paperIds = {};  /* theory → topic → [paper ids] */

  papers.forEach(p => {
    const topics = p.tpL1 ? splitSemi(p.tpL1) : [];
    topics.forEach(t => { if (!topicSet.has(t)) { topicSet.add(t); topicList.push(t); } });
    const theories = p.tName ? splitSemi(p.tName) : [];
    theories.forEach(th => {
      theoryCounts[th] = (theoryCounts[th] || 0) + 1;
      topics.forEach(tp => {
        if (!matrix[th]) matrix[th] = {};
        if (!paperIds[th]) paperIds[th] = {};
        matrix[th][tp] = (matrix[th][tp] || 0) + 1;
        if (!paperIds[th][tp]) paperIds[th][tp] = [];
        paperIds[th][tp].push(p.id);
      });
    });
  });

  const topTheories = Object.entries(theoryCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 20)
    .map(([name, count]) => ({ name, count }));
  topicList.sort();

  return { topTheories, topicList, matrix, paperIds };
}

/* Variable Relationship Map: fuzzy search + pathway extraction */
function fuzzyMatchPapers(searchTerm, papers) {
  if (!searchTerm || !searchTerm.trim()) return [];
  const term = searchTerm.trim().toLowerCase();
  return papers.filter(p => {
    const fields = [p.iv, p.dv, p.med, p.mod, p.title, p.abstract, p.findings, p.tags, p.tName, p.rq, p.gaps, p.dsNamed];
    return fields.some(f => f && f.toLowerCase().includes(term));
  });
}

function extractPathways(papers) {
  const pathwayMap = {}; /* "iv|||dv" → { iv, dv, meds:Set, mods:Set, papers:[] } */
  papers.forEach(p => {
    const ivs = p.iv ? splitSemi(p.iv).filter(v => v && v !== 'N/A' && v !== 'Not Specified') : [];
    const dvs = p.dv ? splitSemi(p.dv).filter(v => v && v !== 'N/A' && v !== 'Not Specified') : [];
    const meds = p.med ? splitSemi(p.med).filter(v => v && v !== 'N/A' && v !== 'Not Specified' && v !== 'None') : [];
    const mods = p.mod ? splitSemi(p.mod).filter(v => v && v !== 'N/A' && v !== 'Not Specified' && v !== 'None') : [];

    ivs.forEach(iv => {
      dvs.forEach(dv => {
        const key = iv.toLowerCase() + '|||' + dv.toLowerCase();
        if (!pathwayMap[key]) pathwayMap[key] = { iv, dv, meds: new Set(), mods: new Set(), papers: [] };
        meds.forEach(m => pathwayMap[key].meds.add(m));
        mods.forEach(m => pathwayMap[key].mods.add(m));
        pathwayMap[key].papers.push({ id: p.id, title: p.title, authors: p.authors, year: p.year, journal: p.journal });
      });
    });
  });

  return Object.values(pathwayMap)
    .map(pw => ({ ...pw, meds: [...pw.meds], mods: [...pw.mods], count: pw.papers.length }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 50);
}

/* (buildMethodTopicMatrix and buildDisciplineTopicMatrix removed — replaced by buildDesignTopicMatrix in MethodTopicHeatmap) */

function heatColor(count, maxCount) {
  if (count === 0) return '#F7F7F7';
  const t = Math.log(count + 1) / Math.log(maxCount + 1);
  // Green gradient: light #E8F5E0 → medium #4CAF50 → dark #1A8917
  const r = Math.round(232 - t * (232 - 26));
  const g = Math.round(245 - t * (245 - 137));
  const b = Math.round(224 - t * (224 - 23));
  return `rgb(${r},${g},${b})`;
}

/* ===== Method × Topic Heatmap Component ===== */
function buildDesignTopicMatrix(papers) {
  const designSet = new Set();
  papers.forEach(p => { if (p.design) splitSemi(p.design).forEach(d => designSet.add(d)); });
  const designs = [...designSet].sort();
  const topicSet = new Set();
  papers.forEach(p => { if (p.tpL1) splitSemi(p.tpL1).forEach(t => topicSet.add(t)); });
  const topics = [...topicSet].sort();
  const counts = {};
  const pIds = {};
  designs.forEach(d => { counts[d] = {}; pIds[d] = {}; topics.forEach(t => { counts[d][t] = 0; pIds[d][t] = []; }); });
  papers.forEach(p => {
    if (p.design && p.tpL1) {
      const dList = splitSemi(p.design);
      const tList = splitSemi(p.tpL1);
      dList.forEach(d => {
        if (!counts[d]) return;
        tList.forEach(t => { if (counts[d][t] !== undefined) { counts[d][t]++; pIds[d][t].push(p.id); } });
      });
    }
  });
  /* Sort designs by total count descending for better readability */
  const designCounts = designs.map(d => ({ name: d, count: topics.reduce((sum, t) => sum + counts[d][t], 0) }));
  designCounts.sort((a, b) => b.count - a.count);
  return { designs: designCounts.map(d => d.name), designCounts, topics, counts, paperIds: pIds };
}

        <div style={{margin:'4px 0'}}><span className="tt-count">{tooltip.count} paper{tooltip.count!==1?'s':''}</span></div>
        {tooltip.samplePapers.length > 0 && <div className="tt-papers">
          {tooltip.samplePapers.map((p,i) => <div key={i}>&bull; {p.title} ({p.year})</div>)}
          {tooltip.count > 3 && <div style={{color:'#aaa',marginTop:2}}>+{tooltip.count - 3} more</div>}
        </div>}
      </div>}
    </div>
  );
}

/* ===== Journal Comparison Component ===== */
function JournalComparison({ papers, darkMode }) {
  const JOURNALS = ['ETP', 'JBV', 'SEJ'];
  const cmpRefs = { theory: useRef(), topic: useRef(), timeline: useRef(), method_etp: useRef(), method_jbv: useRef(), method_sej: useRef() };
  const cmpInst = useRef({});

  /* Aggregate data per journal */
  const jData = useMemo(() => {
    const d = {};
    JOURNALS.forEach(j => {
      const jp = papers.filter(p => p.journal === j);
      const theories = {}, methods = {}, topics = {}, countries = {}, byYear = {};
      let empiricalCount = 0;
      jp.forEach(p => {
        splitSemi(p.tName).forEach(t => { theories[t] = (theories[t] || 0) + 1; });
        splitSemi(p.type).forEach(m => { methods[m] = (methods[m] || 0) + 1; });
        splitSemi(p.tpL1).forEach(t => { topics[t] = (topics[t] || 0) + 1; });
        splitSemi(p.country).forEach(c => { countries[c] = (countries[c] || 0) + 1; });
        if (p.year) byYear[p.year] = (byYear[p.year] || 0) + 1;
        if (p.type && (p.type.includes('Empirical') || p.type.includes('Mixed'))) empiricalCount++;
      });
      const yearRange = jp.filter(p => p.year).map(p => p.year);
      d[j] = {
        count: jp.length,
        theories: Object.entries(theories).sort((a, b) => b[1] - a[1]),
        methods: Object.entries(methods).sort((a, b) => b[1] - a[1]),
        topics: Object.entries(topics).sort((a, b) => b[1] - a[1]),
        countries: Object.entries(countries).sort((a, b) => b[1] - a[1]).slice(0, 5),
        byYear,
        pctEmpirical: jp.length > 0 ? Math.round((empiricalCount / jp.length) * 100) : 0,
        yearMin: yearRange.length ? Math.min(...yearRange) : '-',
        yearMax: yearRange.length ? Math.max(...yearRange) : '-',
      };
    });
    return d;
  }, [papers]);

  /* Render charts */
  useEffect(() => {
    Object.values(cmpInst.current).forEach(c => c?.destroy());
    cmpInst.current = {};
    if (!papers.length) return;

    const dk = darkMode;
    const gridC = dk ? '#333' : '#f5f5f5';
    const tickC = dk ? '#aaa' : undefined;
    const legC = dk ? '#ccc' : undefined;
    const chartFont = { family: '-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif', size: 10 };

    /* Theory comparison: grouped bar */
    if (cmpRefs.theory.current) {
      const allTheories = {};
      JOURNALS.forEach(j => jData[j].theories.slice(0, 8).forEach(([t]) => { allTheories[t] = true; }));
      const labels = Object.keys(allTheories).slice(0, 12);
      cmpInst.current.theory = new Chart(cmpRefs.theory.current, {
        type: 'bar', data: {
          labels: labels.map(l => l.length > 30 ? l.slice(0, 28) + '...' : l),
          datasets: JOURNALS.map(j => ({
            label: j, data: labels.map(t => { const e = jData[j].theories.find(([k]) => k === t); return e ? e[1] : 0; }),
            backgroundColor: JCOL[j], barPercentage: 0.8, categoryPercentage: 0.7
          }))
        }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
          plugins: { legend: { position: 'top', labels: { color:legC, boxWidth: 8, font: chartFont } } },
          scales: { x: { grid: { color: gridC }, ticks: { color:tickC, font: chartFont } }, y: { grid: { display: false }, ticks: { color:tickC, font: chartFont } } }
        }
      });
    }

    /* Topic comparison: grouped bar */
    if (cmpRefs.topic.current) {
      const allTopics = {};
      JOURNALS.forEach(j => jData[j].topics.slice(0, 8).forEach(([t]) => { allTopics[t] = true; }));
      const labels = Object.keys(allTopics).slice(0, 10);
      cmpInst.current.topic = new Chart(cmpRefs.topic.current, {
        type: 'bar', data: {
          labels: labels.map(l => l.length > 30 ? l.slice(0, 28) + '...' : l),
          datasets: JOURNALS.map(j => ({
            label: j, data: labels.map(t => { const e = jData[j].topics.find(([k]) => k === t); return e ? e[1] : 0; }),
            backgroundColor: JCOL[j], barPercentage: 0.8, categoryPercentage: 0.7
          }))
        }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
          plugins: { legend: { position: 'top', labels: { color:legC, boxWidth: 8, font: chartFont } } },
          scales: { x: { grid: { color: gridC }, ticks: { color:tickC, font: chartFont } }, y: { grid: { display: false }, ticks: { color:tickC, font: chartFont } } }
        }
      });
    }

    /* Timeline: line chart */
    if (cmpRefs.timeline.current) {
      const allYears = new Set();
      JOURNALS.forEach(j => Object.keys(jData[j].byYear).forEach(y => allYears.add(y)));
      const years = [...allYears].sort();
      cmpInst.current.timeline = new Chart(cmpRefs.timeline.current, {
        type: 'line', data: {
          labels: years,
          datasets: JOURNALS.map(j => ({
            label: j, data: years.map(y => jData[j].byYear[y] || 0),
            borderColor: JCOL[j], backgroundColor: JCOL[j] + '20', tension: 0.3, pointRadius: 2, borderWidth: 2, fill: false
          }))
        }, options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'top', labels: { color:legC, boxWidth: 8, font: chartFont } } },
          scales: { x: { grid: { display: false }, ticks: { color:tickC, font: chartFont, maxTicksLimit: 20 } }, y: { beginAtZero: true, grid: { color: gridC }, ticks: { color:tickC, font: chartFont } } }
        }
      });
    }

    /* Method doughnut for each journal */
    JOURNALS.forEach(j => {
      const key = 'method_' + j.toLowerCase();
      if (cmpRefs[key]?.current) {
        const methods = jData[j].methods;
        cmpInst.current[key] = new Chart(cmpRefs[key].current, {
          type: 'doughnut', data: {
            labels: methods.map(([m]) => m),
            datasets: [{ data: methods.map(([, c]) => c), backgroundColor: ['#1A8917', '#D4A13A', '#6B5B95', '#4A90E2', '#E8855A', '#2BC5D6', '#FF6B6B', '#999'] }]
          }, options: { responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { color:legC, font: chartFont, boxWidth: 8 } } }
          }
        });
      }
    });

    return () => { Object.values(cmpInst.current).forEach(c => c?.destroy()); };
  }, [jData, papers, darkMode]);

  return (
    <div>
      {/* Summary stats */}
      <div className="comparison-summary">
        {JOURNALS.map(j => (
          <div key={j} className="comparison-stat">
            <div className="j-name" style={{color: JCOL[j]}}>{JFULL[j] || j}</div>
            <div className="stat-row"><span>Papers</span><span className="stat-val">{jData[j].count.toLocaleString()}</span></div>
            <div className="stat-row"><span>Years</span><span className="stat-val">{jData[j].yearMin}&ndash;{jData[j].yearMax}</span></div>
            <div className="stat-row"><span>% Empirical</span><span className="stat-val">{jData[j].pctEmpirical}%</span></div>
          </div>
        ))}
      </div>

      <div className="comparison-grid">
        {/* Timeline */}
        <div className="comparison-card wide">
          <div className="cl">Publications over time by journal</div>
          <div className="ca"><canvas ref={cmpRefs.timeline}></canvas></div>
        </div>

        {/* Theory comparison */}
        <div className="comparison-card">
          <div className="cl">Top theories by journal</div>
          <div className="ca" style={{height:320}}><canvas ref={cmpRefs.theory}></canvas></div>
        </div>

        {/* Topic comparison */}
        <div className="comparison-card">
          <div className="cl">Topic domains by journal</div>
          <div className="ca" style={{height:320}}><canvas ref={cmpRefs.topic}></canvas></div>
        </div>

        {/* Method doughnuts */}
        {JOURNALS.map(j => (
          <div key={j} className="comparison-card">
            <div className="cl" style={{color: JCOL[j]}}>{JFULL[j] || j} &mdash; Paper Types</div>
            <div className="ca" style={{height:220}}><canvas ref={cmpRefs['method_' + j.toLowerCase()]}></canvas></div>
          </div>
        ))}

        {/* Geographic footprint */}
        <div className="comparison-card wide">
          <div className="cl">Top countries by journal</div>
          <table className="comparison-table">
            <thead><tr><th></th>{JOURNALS.map(j => <th key={j} style={{color: JCOL[j]}}>{j}</th>)}</tr></thead>
            <tbody>
              {[0,1,2,3,4].map(i => (
                <tr key={i}>
                  <td style={{color:'#999',fontSize:10}}>#{i+1}</td>
                  {JOURNALS.map(j => {
                    const c = jData[j].countries[i];
                    return <td key={j}>{c ? `${c[0]} (${c[1]})` : '-'}</td>;
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

    </div>
  );
}
